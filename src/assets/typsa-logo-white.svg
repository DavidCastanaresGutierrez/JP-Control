<svg viewBox="0 0 1000 400" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
  <!-- TYPSA Text -->
  <text x="20" y="160" font-family="Arial, sans-serif" font-size="140" font-weight="bold" fill="white" letter-spacing="8">TYPSA</text>

  <!-- Digital Solutions Text -->
  <text x="220" y="260" font-family="Arial, sans-serif" font-size="55" font-weight="300" fill="white" letter-spacing="2">Digital Solutions</text>

  <!-- Building left diagonal -->
  <g stroke="white" stroke-width="14" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 520 80 L 600 160 L 600 360 L 520 360 Z"/>
  </g>

  <!-- Building right with windows -->
  <g stroke="white" stroke-width="14" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <rect x="650" y="160" width="90" height="200"/>

    <!-- Windows -->
    <rect x="670" y="190" width="24" height="24"/>
    <rect x="716" y="190" width="24" height="24"/>

    <rect x="670" y="260" width="24" height="24"/>
    <rect x="716" y="260" width="24" height="24"/>

    <rect x="670" y="320" width="24" height="24"/>
    <rect x="716" y="320" width="24" height="24"/>
  </g>

  <!-- Floating lines only (no fill) -->
  <g stroke="white" stroke-width="14" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <rect x="800" y="50" width="32" height="32"/>
    <rect x="850" y="120" width="24" height="24"/>
    <rect x="890" y="180" width="40" height="40"/>
    <rect x="810" y="300" width="28" height="28"/>
    <rect x="880" y="330" width="26" height="26"/>
  </g>
</svg>