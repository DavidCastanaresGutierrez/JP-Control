<svg viewBox="120 240 800 560" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
  <!-- TYPSA -->
  <text x="125" y="542" font-family="Arial, Helvetica, sans-serif" font-size="128" font-weight="800" fill="#ffffff" letter-spacing="3">TYPSA</text>

  <!-- Digital Solutions -->
  <text x="392" y="602" font-family="Arial, Helvetica, sans-serif" font-size="60" font-weight="400" fill="#ffffff" letter-spacing="0.5">Digital Solutions</text>

  <!-- Central emblem: spine + mirrored leaning shapes -->
  <g stroke="#ffffff" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- vertical spine -->
    <line x1="568" y1="258" x2="568" y2="772"/>
    <!-- upper leaning shape -->
    <path d="M 562 262 L 520 302 L 520 500 L 562 500"/>
    <!-- lower leaning shape (mirrored) -->
    <path d="M 562 530 L 520 530 L 520 728 L 562 768"/>
  </g>

  <!-- Scattered solid squares (upper cluster) -->
  <g fill="#ffffff">
    <rect x="616" y="336" width="56" height="56"/>
    <rect x="700" y="424" width="48" height="48"/>
    <rect x="628" y="440" width="46" height="46"/>
    <rect x="766" y="478" width="42" height="42" transform="rotate(-12 787 499)"/>
    <rect x="840" y="432" width="40" height="40" transform="rotate(-12 860 452)"/>
    <!-- lower pair -->
    <rect x="652" y="628" width="44" height="44"/>
    <rect x="622" y="700" width="50" height="50"/>
  </g>
</svg>