<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Building icon left side -->
  <g>
    <!-- Left building outline -->
    <path d="M 200 80 L 240 120 L 240 240 L 200 240 Z" fill="none" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Right building -->
    <rect x="260" y="100" width="50" height="140" fill="none" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Windows top -->
    <rect x="270" y="110" width="15" height="15" fill="none" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="305" y="110" width="15" height="15" fill="none" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Windows middle -->
    <rect x="270" y="140" width="15" height="15" fill="none" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="305" y="140" width="15" height="15" fill="none" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Windows bottom -->
    <rect x="270" y="170" width="15" height="15" fill="none" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="305" y="170" width="15" height="15" fill="none" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Floating squares -->
    <rect x="330" y="75" width="20" height="20" fill="white"/>
    <rect x="360" y="110" width="14" height="14" fill="white"/>
    <rect x="385" y="140" width="24" height="24" fill="white"/>
    <rect x="330" y="200" width="18" height="18" fill="white"/>
    <rect x="365" y="220" width="16" height="16" fill="white"/>
  </g>

  <!-- Text -->
  <text x="420" y="140" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="white" letter-spacing="2">TYPSA</text>
  <text x="420" y="200" font-family="Arial, sans-serif" font-size="42" font-weight="300" fill="white" letter-spacing="1">Digital Solutions</text>
</svg>